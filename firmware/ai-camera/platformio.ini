[platformio]
default_envs = xiao-esp32s3-ai-camera

[env:xiao-esp32s3-ai-camera]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

monitor_filters =
    esp32_exception_decoder

board_build.flash_size = 8MB
board_build.partitions = huge_app.csv

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D AI_CAMERA_NODE
    -D ENABLE_AI_INFERENCE
    -D ENABLE_WIFI
    -D ENABLE_OTA
    -I include
    -I include/config
    -I include/interfaces

lib_deps =
    bblanchon/ArduinoJson
    seeed-studio/Seeed_Arduino_SSCMA

upload_protocol = esptool

; OTA upload — enable after first USB flash
; upload_protocol = espota
; upload_port = rover-camera.local
; upload_flags =
;     --auth=rover-ota-2025