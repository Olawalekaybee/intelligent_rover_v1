[platformio]
default_envs = esp32-main

[env:esp32-main]
platform = espressif32
board = esp32dev
framework = arduino

; ======================================================
; Serial Monitor
; ======================================================

monitor_speed = 115200

monitor_filters =
    esp32_exception_decoder

; Optional fixed monitor port
; monitor_port = /dev/ttyUSB1

; ======================================================
; Upload Configuration
; ======================================================

upload_speed = 921600

; ------------------------------------------------------
; USB Upload (DEFAULT)
; Uncomment for USB flashing
; ------------------------------------------------------
upload_protocol = esptool

; ------------------------------------------------------
; OTA Upload
; Uncomment AFTER first USB flash
; ------------------------------------------------------

; upload_protocol = espota
; ; upload_port = intelligent-rover-main.local
; upload_port = 10.99.188.148

; upload_flags =
;     --auth=rover-ota-2025
;     --timeout=60
; 
; ======================================================
; ESP32 Flash Configuration
; ======================================================

board_build.flash_mode = dio
board_build.partitions = huge_app.csv

; ======================================================
; Build Flags
; ======================================================

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ENABLE_BLUETOOTH_CLASSIC
    -D ENABLE_OTA
    -D ENABLE_THINGSPEAK

    -I include
    -I include/config
    -I include/pins
    -I include/protocols
    -I lib/TelemetryManager

; ======================================================
; Libraries
; ======================================================

lib_deps =
    adafruit/Adafruit AHTX0
    adafruit/Adafruit Unified Sensor
    https://github.com/sciosense/ENS160_driver.git
    mikalhart/TinyGPSPlus
    bblanchon/ArduinoJson

; ======================================================
; OTA Upload Examples
; ======================================================

; Upload using hostname:
; pio run -t upload

; Upload using IP:
; upload_port = 192.168.1.45

; Then:
; pio run -t upload